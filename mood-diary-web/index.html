<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情记录日历</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <span class="logo-dot"></span>
          </div>
          <div>
            <h1>心晴手帐</h1>
            <p class="subtitle">大地之上有阿莱夫，阿莱夫之上又有大地。</p>
          </div>
        </div>
      </header>

      <section id="auth-panel" class="card auth-panel"></section>

      <main>
        <section id="home-view" class="view"></section>
        <section id="day-view" class="view hidden"></section>
      </main>
    </div>

    <template id="month-template">
      <article class="month-card">
        <h2 class="month-title"></h2>
        <div class="weekday-row">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="month-grid"></div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
